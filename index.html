<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
    <meta name="theme-color" content="#000a4e" />
    <title>ebb.rocks</title>
    <meta name="description" content="ebb.rocks" />
    <link rel="icon" href="/img/weavermask.png" type="image/png" sizes="any" />
    <link rel="apple-touch-icon" href="/img/weavermask.png" />
    <link rel="preload" href="/video/oceanloop.mp4" as="video" type="video/mp4" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to main content</a>
    <!-- loading overlay mens video-buffering skjer -->
    <div id="loading" class="loading-overlay" aria-busy="true" aria-label="Loading video">
      <div class="loading-cog" aria-hidden="true">⚙</div>
      <p class="loading-text">Loading…</p>
    </div>

    <div id="app" class="layout">
      <main id="main" class="site-main" tabindex="-1">
        <!-- hero: bakgrunnsvideo + PDA-player (alt scroller bort som én blokk) -->
        <section id="intro" class="site-hero" aria-label="Introduction">
          <div class="site-hero__media" aria-hidden="true">
            <!-- bakgrunnsvideo (muted + playsinline for mobile) -->
            <video
              id="bg-video"
              class="site-hero__video"
              aria-hidden="true"
              role="presentation"
              tabindex="-1"
              autoplay
              muted
              loop
              playsinline
              disablepictureinpicture
              disableremoteplayback
              preload="auto"
            >
              <source src="/video/oceanloop.mp4" type="video/mp4" />
            </video>
          </div>
          <div class="site-hero__content intro-hero">
            <h1 class="visually-hidden">ebb.rocks</h1>
            <!-- PDA-boks (bilde + overlay UI + refresh knapp) -->
            <div class="pda-shell">
              <div class="pda-shell__rotator">
                <img class="pda-showcase" src="/img/PDA2.png" alt="PDA" />
                <!-- overlay player UI (cover + play + progress + tid) -->
                <section class="pda-player" aria-label="PDA music player" data-pda-player>
                  <div class="pda-player__media">
                    <img class="pda-player__cover" data-pda-cover alt="" />
                  </div>
                  <div class="pda-player__info">
                    <div class="pda-player__controls">
                      <button type="button" class="pda-player__toggle" data-pda-toggle aria-label="Play track">▶</button>
                      <input
                        class="pda-player__progress"
                        data-pda-progress
                        type="range"
                        min="0"
                        max="100"
                        value="0"
                        step="0.1"
                        aria-label="Song progress"
                      />
                    </div>
                    <p class="pda-player__title" data-pda-title></p>
                    <p class="pda-player__times">
                      <span data-pda-duration>--:--</span>
                      <span aria-hidden="true">|</span>
                      <span data-pda-remaining>--:--</span>
                    </p>
                  </div>
                </section>
                <button
                  type="button"
                  class="pda-refresh-button"
                  data-pda-refresh
                  aria-label="Next song"
                  title="Next song"
                ></button>
              </div>
              <!-- sosial-lenker under PDA -->
              <nav class="social-links" aria-label="Social links">
                <a
                  class="social-links__button"
                  href="https://discord.com/users/502905754345406485"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Discord profile"
                  title="Discord"
                >
                  <img src="https://cdn.simpleicons.org/discord/ffffff" alt="" aria-hidden="true" />
                </a>
                <a
                  class="social-links__button"
                  href="https://steamcommunity.com/profiles/76561198870890710/"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Steam profile"
                  title="Steam"
                >
                  <img src="https://cdn.simpleicons.org/steam/ffffff" alt="" aria-hidden="true" />
                </a>
                <a
                  class="social-links__button"
                  href="https://www.tiktok.com/@ebbe.08"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="TikTok profile"
                  title="TikTok"
                >
                  <img src="https://cdn.simpleicons.org/tiktok/ffffff" alt="" aria-hidden="true" />
                </a>
                <a
                  class="social-links__button"
                  href="https://github.com/EbbGithub08"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="GitHub profile"
                  title="GitHub"
                >
                  <img src="https://cdn.simpleicons.org/github/ffffff" alt="" aria-hidden="true" />
                </a>
                <a
                  class="social-links__button"
                  href="https://open.spotify.com/user/pro5awrbm0uhy7xnrhmal7yb0"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Spotify profile"
                  title="Spotify"
                >
                  <img src="https://cdn.simpleicons.org/spotify/ffffff" alt="" aria-hidden="true" />
                </a>
              </nav>
            </div>
          </div>
        </section>

        <!-- comments: auth panel + composer + liste -->
        <section
          class="content-section content-section--comments comments-section"
          id="comments"
          aria-label="Comments"
          data-comments-root
        >
          <header class="comments-section__header">
            <h2 class="comments-section__title">Comments</h2>
          </header>
          <p class="auth-panel__db-warning" data-db-warning hidden>
            Login is unavailable right now because the auth service cannot be reached.
          </p>
          <div class="auth-panel" data-auth-panel>
            <p class="auth-panel__status" data-auth-status role="status" aria-live="polite">Checking login status...</p>
            <form class="auth-panel__form" data-auth-form aria-label="Authentication form">
              <label class="auth-panel__field">
                <span>Email</span>
                <input type="email" name="email" autocomplete="email" required />
              </label>
              <label class="auth-panel__field">
                <span>Password</span>
                <input type="password" name="password" autocomplete="current-password" minlength="8" required />
              </label>
              <div class="auth-panel__actions">
                <button type="submit" data-auth-action="login">Login</button>
                <button type="button" data-auth-action="register">Register</button>
                <button type="button" data-auth-action="logout">Logout</button>
              </div>
            </form>
          </div>
          <form class="comments-form" data-comments-form aria-label="Add a new comment">
            <div class="comments-form__field">
              <label for="comment-body">Add a comment</label>
              <textarea
                id="comment-body"
                name="comment"
                rows="4"
                maxlength="2000"
                placeholder="Write your message here..."
                required
              ></textarea>
            </div>
            <div class="comments-form__actions">
              <button type="submit">Post comment</button>
            </div>
            <p class="comments-form__status" data-comments-status role="status" aria-live="polite">Login to post a comment.</p>
          </form>
          <ul class="comments-thread" id="comments-thread" aria-label="Comments list" aria-live="polite" aria-relevant="additions text"></ul>
        </section>
      </main>
    </div>
    <!-- flytende nav som dukker opp når du scroller -->
    <nav class="scroll-nav" data-scroll-nav aria-label="Account quick actions">
      <div class="scroll-nav__inner">
        <p class="scroll-nav__user" data-scroll-user>Not logged in</p>
        <button type="button" class="scroll-nav__logout" data-scroll-logout hidden>Logout</button>
      </div>
    </nav>

    <!-- app entry -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
