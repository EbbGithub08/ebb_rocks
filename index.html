<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f172a" />
    <title>ebb.rocks</title>
    <meta name="description" content="ebb.rocks" />
    <link rel="icon" href="img/weavermask.png" type="image/png" sizes="any" />
    <link rel="apple-touch-icon" href="img/weavermask.png" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      .bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .content-img {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <video
      id="bgVideo"
      class="bg-video"
      src="img/oceanloop.mp4"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      aria-hidden="true"
      tabindex="-1"
      role="presentation"
      draggable="false"
    ></video>
    <img
      class="content-img"
      src="img/weavermask.png"
      alt="Weaver mask"
      width="287"
      height="305"
      decoding="async"
    />
    <script>
      // Autoplay can occasionally pause (e.g. tab switching/buffering).
      // Keep it running continuously, but never make it interactive.
      const v = document.getElementById("bgVideo");
      const ensurePlaying = async () => {
        if (!v) return;
        try {
          if (v.paused || v.ended) await v.play();
        } catch {
          // Ignore autoplay/play errors (browser may still block in some cases).
        }
      };

      v?.addEventListener("pause", ensurePlaying);
      v?.addEventListener("ended", ensurePlaying);
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") ensurePlaying();
      });

      ensurePlaying();
    </script>
  </body>
</html>
